services:
  agent:
    build: .
    ports:
      - "127.0.0.1:8000:8000"
    env_file: .env
    volumes:
      - ~/docyt-vault:/vault:rw
      - ./data:/app/data:rw
      - ~/.ssh:/root/.ssh:ro
      - ~/docyt:/repos:rw
    environment:
      - GIT_AUTHOR_NAME=${GIT_AUTHOR_NAME:-Divyanshu Sharma}
      - GIT_AUTHOR_EMAIL=${GIT_AUTHOR_EMAIL:-divyanshu.sharma@docyt.com}
      - GIT_COMMITTER_NAME=${GIT_COMMITTER_NAME:-Divyanshu Sharma}
      - GIT_COMMITTER_EMAIL=${GIT_COMMITTER_EMAIL:-divyanshu.sharma@docyt.com}
    restart: unless-stopped
